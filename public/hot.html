<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>今日热门活动</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .header {
            background: linear-gradient(135deg, #ff6b00, #ff8f00);
            color: white;
            padding: 20px 16px;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .back-btn {
            font-size: 24px;
            text-decoration: none;
            color: white;
        }
        .header-title h1 {
            font-size: 18px;
            font-weight: 600;
        }
        .header-title p {
            font-size: 12px;
            opacity: 0.9;
            margin-top: 4px;
        }
        .section { padding: 20px 16px; }
        .section-title {
            font-size: 17px;
            font-weight: 700;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .hot-badge {
            background: rgba(255,255,255,0.3);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
        .activity-card {
            background: white;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: inherit;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
            transition: transform 0.2s;
            gap: 14px;
        }
        .activity-card:active { transform: scale(0.98); }
        .ac-icon {
            width: 48px;
            height: 48px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            flex-shrink: 0;
            background: linear-gradient(135deg, #ff6b00, #ff8f00);
        }
        .ac-info { flex: 1; }
        .ac-name { font-size: 15px; font-weight: 600; }
        .ac-desc { font-size: 12px; color: #6b7280; margin-top: 3px; }
        .ac-time { font-size: 11px; color: #9ca3af; margin-top: 2px; }
        .ac-arrow { color: #c0c0c0; font-size: 18px; }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #9ca3af;
        }
        .empty-state .empty-icon { font-size: 48px; margin-bottom: 12px; }
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: white;
            display: flex;
            border-top: 1px solid #f3f4f6;
            z-index: 50;
        }
        .bottom-nav a {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 8px 0 12px;
            text-decoration: none;
            color: #9ca3af;
            font-size: 11px;
        }
        .bottom-nav a.active { color: #ff6b00; }
        .bottom-nav .nav-icon { font-size: 20px; margin-bottom: 2px; }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.82);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <a href="/" class="back-btn">←</a>
            <div class="header-title">
                <h1>今日热门活动</h1>
                <p>今日最新互助活动汇总</p>
            </div>
            <span class="hot-badge">🔥 HOT</span>
        </div>
    </div>

    <section class="section">
        <div class="section-title">📋 全部活动</div>
        <div id="hotList">
            <div class="empty-state">
                <div class="empty-icon">📭</div>
                <div>加载中...</div>
            </div>
        </div>
    </section>

    <nav class="bottom-nav">
        <a href="/">
            <span class="nav-icon">🏠</span> 首页
        </a>
        <a href="/pdd.html">
            <span class="nav-icon">🎁</span> PDD
        </a>
        <a href="/jd.html">
            <span class="nav-icon">🛒</span> 京东
        </a>
        <a href="/hot.html" class="active">
            <span class="nav-icon">🔥</span> 热门
        </a>
    </nav>

    <div class="toast" id="toast"></div>

    <script>
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        async function loadHotActivities() {
            try {
                const r = await fetch('/api/hot');
                const activities = await r.json();
                renderActivities(activities);
            } catch(e) {
                document.getElementById('hotList').innerHTML =
                    '<div class="empty-state"><div class="empty-icon">❌</div><div>加载失败</div></div>';
            }
        }

        function renderActivities(activities) {
            const container = document.getElementById('hotList');
            if (activities.length === 0) {
                container.innerHTML = '<div class="empty-state"><div class="empty-icon">📭</div><div>暂无热门活动</div></div>';
                return;
            }
            container.innerHTML = activities.map((a, i) => {
                const timeStr = a.created_at ? new Date(a.created_at.replace(' ', 'T')).toLocaleString('zh-CN') : '';
                return `
                    <a href="${a.url}" class="activity-card">
                        <div class="ac-icon">${a.icon || '🎯'}</div>
                        <div class="ac-info">
                            <div class="ac-name">${a.title}</div>
                            <div class="ac-desc">${a.description || ''}</div>
                            ${timeStr ? `<div class="ac-time">发布于 ${timeStr}</div>` : ''}
                        </div>
                        <span class="ac-arrow">›</span>
                    </a>
                `;
            }).join('');
        }

        loadHotActivities();
        setInterval(loadHotActivities, 60000);
    </script>
</body>
</html>
