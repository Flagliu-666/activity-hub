<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活动互助站</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            min-height: 100vh;
            padding-bottom: 100px;
        }
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 36px 20px 30px;
            text-align: center;
        }
        .logo {
            width: 56px; height: 56px; border-radius: 50%;
            background: rgba(255,255,255,0.2);
            margin: 0 auto 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 28px; border: 2px solid rgba(255,255,255,0.3);
        }
        .title { font-size: 24px; font-weight: 700; margin-bottom: 6px; }
        .slogan { font-size: 14px; opacity: 0.9; }
        .stats {
            display: flex; gap: 10px;
            padding: 16px 16px 0;
            margin-top: -20px;
            position: relative; z-index: 2;
        }
        .stat-card {
            flex: 1; background: white;
            border-radius: 14px; padding: 14px 10px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .stat-num { font-size: 22px; font-weight: 700; color: #6366f1; }
        .stat-label { font-size: 12px; color: #6b7280; margin-top: 4px; }
        .section { padding: 20px 16px 10px; }
        .section-title {
            font-size: 17px; font-weight: 700;
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 12px;
        }
        .hot-badge {
            display: inline-flex; align-items: center; gap: 4px;
            background: linear-gradient(135deg, #ff6b00, #ff8f00);
            color: white; padding: 4px 10px;
            border-radius: 12px; font-size: 12px; font-weight: 600;
            animation: hotPulse 2s ease-in-out infinite;
        }
        @keyframes hotPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        .activity-card {
            background: white; border-radius: 16px; padding: 16px;
            margin-bottom: 10px;
            display: flex; align-items: center;
            text-decoration: none; color: inherit;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
            transition: transform 0.2s;
            gap: 14px;
        }
        .activity-card:active { transform: scale(0.98); }
        .ac-icon {
            width: 48px; height: 48px; border-radius: 14px;
            display: flex; align-items: center; justify-content: center;
            font-size: 24px; flex-shrink: 0;
        }
        .ac-icon.orange { background: linear-gradient(135deg, #ff6b00, #ff8f00); }
        .ac-icon.red { background: linear-gradient(135deg, #e1251b, #ff6b6b); }
        .ac-icon.blue { background: linear-gradient(135deg, #3b82f6, #60a5fa); }
        .ac-info { flex: 1; }
        .ac-name { font-size: 15px; font-weight: 600; }
        .ac-desc { font-size: 12px; color: #6b7280; margin-top: 3px; }
        .ac-meta { font-size: 11px; color: #9ca3af; margin-top: 2px; }
        .ac-arrow { color: #c0c0c0; font-size: 18px; }
        .hot-activity-card {
            background: white; border-radius: 16px; padding: 16px;
            margin-bottom: 10px;
            display: flex; align-items: center;
            text-decoration: none; color: inherit;
            box-shadow: 0 1px 6px rgba(0,0,0,0.04);
            transition: transform 0.2s;
            gap: 14px;
        }
        .hot-activity-card:active { transform: scale(0.98); }
        .footer { text-align: center; padding: 30px 20px 40px; }
        .footer-copy { font-size: 11px; color: #c0c0c0; }
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.55);
            display: none; align-items: center; justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white; border-radius: 20px;
            padding: 28px 24px 20px; text-align: center;
            max-width: 300px; width: 90%;
        }
        .modal-qr-placeholder {
            width: 180px; height: 180px; border-radius: 12px;
            margin: 0 auto 14px; overflow: hidden;
        }
        .modal-qr-placeholder img { width: 100%; height: 100%; object-fit: cover; }
        .modal-close {
            background: #f0f2f5; color: #6b7280;
            padding: 10px 36px; border-radius: 20px;
            font-size: 14px; cursor: pointer;
        }
        .toast {
            position: fixed; top: 20px; left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.8); color: white;
            padding: 10px 20px; border-radius: 20px;
            font-size: 14px; z-index: 2000;
            opacity: 0; transition: opacity 0.3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">🤝</div>
        <div class="title">活动互助站</div>
        <div class="slogan">互助共赢 · 省心省力 · 一起撸毛</div>
    </header>

    <div class="stats">
        <div class="stat-card">
            <div class="stat-num" id="statPdd">--</div>
            <div class="stat-label">PDD助力码</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="statJd">--</div>
            <div class="stat-label">京东链接</div>
        </div>
        <div class="stat-card">
            <div class="stat-num" id="statUsed">--</div>
            <div class="stat-label">已助力</div>
        </div>
    </div>

    <!-- 今日热门活动 -->
    <section class="section">
        <div class="section-title">
            🔥 今日热门活动 <span class="hot-badge">🔥 HOT</span>
        </div>
        <a href="/hot.html" class="activity-card">
            <div class="ac-icon orange">📋</div>
            <div class="ac-info">
                <div class="ac-name">查看全部热门活动</div>
                <div class="ac-desc">今日最新互助活动汇总</div>
            </div>
            <span class="ac-arrow">›</span>
        </a>
        <div id="hotList"></div>
    </section>

    <!-- 选择活动 -->
    <section class="section">
        <div class="section-title">🎯 选择活动</div>

        <a href="/pdd.html" class="activity-card">
            <div class="ac-icon orange">🎁</div>
            <div class="ac-info">
                <div class="ac-name">PDD福袋互助</div>
                <div class="ac-desc">拼多多福袋邀请码互助，一键复制跳转</div>
                <div class="ac-meta">🔁 实时可用 · 点击进入</div>
            </div>
            <span class="ac-arrow">›</span>
        </a>

        <a href="/jd.html" class="activity-card">
            <div class="ac-icon red">🛒</div>
            <div class="ac-info">
                <div class="ac-name">京东助力互助</div>
                <div class="ac-desc">京东外卖/红包组队互助，点击直接跳转</div>
                <div class="ac-meta">🔁 实时可用 · 点击进入</div>
            </div>
            <span class="ac-arrow">›</span>
        </a>

        <a href="javascript:void(0)" class="activity-card" onclick="showToast('即将上线，敬请期待')">
            <div class="ac-icon blue">🍔</div>
            <div class="ac-info">
                <div class="ac-name">组队互助</div>
                <div class="ac-desc">美团/饿了么等组队活动</div>
                <div class="ac-meta">🔜 即将上线</div>
            </div>
            <span class="ac-arrow">›</span>
        </a>
    </section>

    <footer class="footer">
        <div class="footer-copy">© 2026 活动互助站 · 互助让生活更美好</div>
    </footer>

    <div class="toast" id="toast"></div>

    <script>
        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // 加载统计数据
        fetch('/api/stats')
            .then(r => r.json())
            .then(res => {
                document.getElementById('statPdd').textContent = res.pdd_available;
                document.getElementById('statJd').textContent = res.jd_available;
                document.getElementById('statUsed').textContent = res.pdd_used + res.jd_used;
            })
            .catch(() => {
                document.getElementById('statPdd').textContent = '--';
                document.getElementById('statJd').textContent = '--';
                document.getElementById('statUsed').textContent = '--';
            });

        // 加载热门活动
        fetch('/api/hot')
            .then(r => r.json())
            .then(activities => {
                const container = document.getElementById('hotList');
                if (activities.length === 0) {
                    container.innerHTML = '';
                    return;
                }
                container.innerHTML = activities.slice(0, 3).map(a => `
                    <a href="${a.url}" class="hot-activity-card">
                        <div style="font-size: 24px;">${a.icon || '🎯'}</div>
                        <div class="ac-info">
                            <div class="ac-name">${a.title}</div>
                            <div class="ac-desc">${a.description || ''}</div>
                        </div>
                        <span class="ac-arrow">›</span>
                    </a>
                `).join('');
            })
            .catch(() => {});
    </script>
</body>
</html>
