<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 二手闲置平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #f5f5f5; font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', sans-serif; padding-bottom: 80px; }
        .header { background: linear-gradient(135deg, #667eea, #764ba2); color: white; padding: 20px 16px; position: sticky; top: 0; z-index: 10; }
        .header-top { display: flex; align-items: center; justify-content: space-between; }
        .header-title h1 { font-size: 20px; font-weight: 700; }
        .header-title p { font-size: 13px; opacity: 0.9; margin-top: 4px; }
        .logout-btn { background: rgba(255,255,255,0.2); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .tabs { display: flex; background: white; border-bottom: 1px solid #e5e7eb; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 14px 8px; border: none; background: none; font-size: 14px; font-weight: 500; color: #666; cursor: pointer; border-bottom: 3px solid transparent; white-space: nowrap; }
        .tab-btn.active { color: #667eea; border-bottom-color: #667eea; }
        .content { padding: 16px; }
        .section { display: none; }
        .section.active { display: block; }
        .card { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 1px 4px rgba(0,0,0,0.06); }
        .card-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 12px; }
        .form-group { margin-bottom: 12px; }
        .form-label { display: block; font-size: 13px; color: #666; margin-bottom: 6px; }
        .form-input, .form-textarea, .form-select { width: 100%; padding: 10px 12px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 14px; outline: none; }
        .form-input:focus, .form-textarea:focus { border-color: #667eea; }
        .form-textarea { min-height: 80px; resize: vertical; }
        .btn { padding: 10px 16px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-success { background: #10b981; color: white; }
        .btn-secondary { background: #f3f4f6; color: #666; }
        .item-list { margin-top: 16px; }
        .item-card { background: #f9fafb; border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
        .item-title { font-size: 14px; font-weight: 600; color: #333; }
        .item-actions { display: flex; gap: 8px; }
        .btn-small { padding: 6px 12px; font-size: 12px; border-radius: 6px; }
        .empty-state { text-align: center; padding: 40px 20px; color: #999; }
        .toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.82); color: white; padding: 12px 24px; border-radius: 20px; font-size: 14px; z-index: 2000; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
        .toast.show { opacity: 1; }
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; border-top: 1px solid #e5e7eb; z-index: 50; }
        .bottom-nav a { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px 0 12px; text-decoration: none; color: #999; font-size: 11px; }
        .bottom-nav a.active { color: #667eea; }
        .bottom-nav .nav-icon { font-size: 20px; margin-bottom: 2px; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-available { background: #dcfce7; color: #166534; }
        .badge-sold { background: #fee2e2; color: #991b1b; }
        .product-image-small { width: 60px; height: 60px; object-fit: cover; border-radius: 6px; }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <div class="header-title"><h1>🔧 管理后台</h1><p id="adminInfo">正在验证权限...</p></div>
            <button class="logout-btn" onclick="logout()">退出登录</button>
        </div>
    </div>
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('products')">📦 商品管理</button>
        <button class="tab-btn" onclick="switchTab('ads')">📢 广告管理</button>
        <button class="tab-btn" onclick="switchTab('admins')">👥 管理员</button>
    </div>
    <div class="content">
        <div id="tab-products" class="section active">
            <div class="card">
                <div class="card-title">📋 商品列表（仅可查看和删除）</div>
                <p style="color:#999;font-size:13px;margin-bottom:12px;">管理员只能查看、删除用户发布的商品，不能添加商品</p>
            </div>
            <div class="item-list" id="productList"></div>
        </div>
        <div id="tab-ads" class="section">
            <div class="card">
                <div class="card-title">添加广告</div>
                <div class="form-group"><label class="form-label">标题 *</label><input type="text" class="form-input" id="adTitle" placeholder="广告标题"></div>
                <div class="form-group"><label class="form-label">描述</label><textarea class="form-textarea" id="adDesc" placeholder="广告描述"></textarea></div>
                <div class="form-group"><label class="form-label">图片链接</label><input type="text" class="form-input" id="adImage" placeholder="https://..."></div>
                <div class="form-group"><label class="form-label">排序（数字越大越靠前）</label><input type="number" class="form-input" id="adSort" value="0"></div>
                <button class="btn btn-primary" onclick="addAd()" style="width:100%;">添加广告</button>
            </div>
            <div class="item-list" id="adList"></div>
        </div>
        <div id="tab-admins" class="section">
            <div class="card">
                <div class="card-title">🔑 修改密码</div>
                <div class="form-group"><label class="form-label">当前密码</label><input type="password" class="form-input" id="currentPassword" placeholder="输入当前密码"></div>
                <div class="form-group"><label class="form-label">新密码</label><input type="password" class="form-input" id="newPassword" placeholder="输入新密码"></div>
                <div class="form-group"><label class="form-label">确认新密码</label><input type="password" class="form-input" id="confirmPassword" placeholder="再次输入新密码"></div>
                <button class="btn btn-primary" onclick="changePassword()" style="width:100%;">修改密码</button>
            </div>
            <div class="card">
                <div class="card-title">添加管理员</div>
                <div class="form-group"><label class="form-label">用户名</label><input type="text" class="form-input" id="adminUsername" placeholder="新管理员用户名"></div>
                <div class="form-group"><label class="form-label">密码</label><input type="password" class="form-input" id="adminPassword" placeholder="设置密码"></div>
                <div class="form-group"><label class="form-label">角色</label><select class="form-select" id="adminRole"><option value="admin">管理员</option><option value="sub_admin">副管理员</option></select></div>
                <button class="btn btn-primary" onclick="addAdmin()" style="width:100%;">添加管理员</button>
            </div>
            <div class="card"><div class="card-title">管理员列表</div><div id="adminList"></div></div>
        </div>
    </div>
    <nav class="bottom-nav">
        <a href="/"><span class="nav-icon">🏠</span>首页</a>
        <a href="javascript:void(0)" class="active"><span class="nav-icon">🔧</span>管理</a>
    </nav>
    <div class="toast" id="toast"></div>
    <script>
        let adminSession = localStorage.getItem('admin_session'), adminRole = localStorage.getItem('admin_role'), adminUsername = localStorage.getItem('admin_username');
        if (!adminSession) window.location.href = '/admin-login.html';
        async function checkAuth() {
            try {
                const res = await fetch('/api/admin/info', { headers: { 'X-Admin-Session': adminSession } });
                if (!res.ok) { localStorage.clear(); window.location.href = '/admin-login.html'; return false; }
                return true;
            } catch(e) { localStorage.clear(); window.location.href = '/admin-login.html'; return false; }
        }
        function logout() { if (confirm('确定要退出登录吗？')) { localStorage.clear(); window.location.href = '/admin-login.html'; } }
        function switchTab(tabName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelectorAll('.section').forEach(section => section.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('tab-' + tabName).classList.add('active');
            if (tabName === 'products') loadProducts();
            if (tabName === 'ads') loadAds();
            if (tabName === 'admins') { if (adminRole === 'master') loadAdmins(); }
        }
        function showToast(msg) { const toast = document.getElementById('toast'); toast.textContent = msg; toast.classList.add('show'); setTimeout(() => toast.classList.remove('show'), 2500); }
        async function loadProducts() {
            try {
                const res = await fetch('/api/products');
                const products = await res.json();
                renderProducts(products);
            } catch(e) { showToast('加载失败'); }
        }
        function renderProducts(products) {
            const container = document.getElementById('productList');
            if (products.length === 0) { container.innerHTML = '<div class="empty-state">暂无商品</div>'; return; }
            container.innerHTML = products.map(p => {
                const images = JSON.parse(p.images || '[]'), imageUrl = images[0] || '', statusClass = p.status === 'available' ? 'badge-available' : 'badge-sold', statusText = p.status === 'available' ? '在售' : '已售';
                return `<div class="item-card"><div class="item-header"><div style="display:flex;align-items:center;gap:12px;flex:1;"><img class="product-image-small" src="${imageUrl}" alt="${p.title}"><div style="flex:1;"><div class="item-title">${p.title}</div><div style="font-size:12px;color:#999;">${p.category} · ¥${p.price || 0} · ${p.contact}</div></div></div></div><div style="font-size:12px;color:#999;margin:8px 0;">${p.description || ''}</div><div style="display:flex;gap:8px;align-items:center;"><span class="badge ${statusClass}">${statusText}</span><span style="font-size:12px;color:#999;">发布者: ${p.publisher_student_id || '未知'}</span><div style="flex:1;"></div><button class="btn btn-danger btn-small" onclick="deleteProduct(${p.id})">删除</button></div></div>`;
            }).join('');
        }
        async function updateStatus(id, status) {
            try {
                const res = await fetch(`/api/products/${id}/status`, { method: 'PUT', headers: { 'Content-Type': 'application/json', 'X-Admin-Session': adminSession }, body: JSON.stringify({ status }) });
                const data = await res.json();
                if (data.success) { showToast('✅ 状态已更新'); loadProducts(); }
                else showToast('⚠️ ' + (data.error || '更新失败'));
            } catch(e) { showToast('⚠️ 网络错误'); }
        }
        async function deleteProduct(id) {
            if (!confirm('确定要删除这个商品吗？')) return;
            try {
                const res = await fetch(`/api/products/${id}`, { method: 'DELETE', headers: { 'X-Admin-Session': adminSession } });
                const data = await res.json();
                if (data.success) { showToast('✅ 删除成功'); loadProducts(); }
                else showToast('⚠️ ' + (data.error || '删除失败'));
            } catch(e) { showToast('⚠️ 网络错误'); }
        }
        async function loadAds() {
            try {
                const res = await fetch('/api/ads');
                const ads = await res.json();
                renderAds(ads);
            } catch(e) { showToast('加载失败'); }
        }
        function renderAds(ads) {
            const container = document.getElementById('adList');
            if (ads.length === 0) { container.innerHTML = '<div class="empty-state">暂无广告</div>'; return; }
            container.innerHTML = ads.map(ad => `<div class="item-card"><div class="item-header"><div><div class="item-title">${ad.title}</div><div style="font-size:12px;color:#999;">${ad.description || ''}</div></div><button class="btn btn-danger btn-small" onclick="deleteAd(${ad.id})">删除</button></div></div>`).join('');
        }
        async function addAd() {
            const title = document.getElementById('adTitle').value.trim(), desc = document.getElementById('adDesc').value.trim(), image_url = document.getElementById('adImage').value.trim(), sort_order = parseInt(document.getElementById('adSort').value) || 0;
            if (!title) { showToast('⚠️ 请填写广告标题'); return; }
            try {
                const res = await fetch('/api/admin/ads', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Session': adminSession }, body: JSON.stringify({ title, description: desc, image_url, link_url: '', sort_order }) });
                const data = await res.json();
                if (data.success) { showToast('✅ 添加成功'); document.getElementById('adTitle').value = ''; document.getElementById('adDesc').value = ''; document.getElementById('adImage').value = ''; loadAds(); }
                else showToast('⚠️ ' + (data.error || '添加失败'));
            } catch(e) { showToast('⚠️ 网络错误'); }
        }
        async function deleteAd(id) {
            if (!confirm('确定要删除这个广告吗？')) return;
            try {
                const res = await fetch(`/api/admin/ads/${id}`, { method: 'DELETE', headers: { 'X-Admin-Session': adminSession } });
                const data = await res.json();
                if (data.success) { showToast('✅ 删除成功'); loadAds(); }
                else showToast('⚠️ ' + (data.error || '删除失败'));
            } catch(e) { showToast('⚠️ 网络错误'); }
        }
        async function loadAdmins() {
            try {
                const res = await fetch('/api/admins', { headers: { 'X-Admin-Session': adminSession } });
                const admins = await res.json();
                const container = document.getElementById('adminList');
                container.innerHTML = admins.map(a => {
                    const roleText = a.role === 'master' ? '主管理员' : (a.role === 'admin' ? '管理员' : '副管理员');
                    const canDelete = a.role !== 'master';
                    return `<div class="item-card"><div class="item-header"><div><div class="item-title">${a.username}</div><div style="font-size:12px;color:#999;">${roleText}</div></div>${canDelete ? `<button class="btn btn-danger btn-small" onclick="deleteAdmin(${a.id})">删除</button>` : ''}</div></div>`;
                }).join('');
            } catch(e) { showToast('加载失败'); }
        }
        async function addAdmin() {
            if (adminRole !== 'master') { showToast('⚠️ 只有主管理员可以添加管理员'); return; }
            const username = document.getElementById('adminUsername').value.trim(), password = document.getElementById('adminPassword').value, role = document.getElementById('adminRole').value;
            if (!username || !password) { showToast('⚠️ 请填写用户名和密码'); return; }
            try {
                const res = await fetch('/api/admins', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Session': adminSession }, body: JSON.stringify({ username, password, role }) });
                const data = await res.json();
                if (data.success) { showToast('✅ 添加成功'); document.getElementById('adminUsername').value = ''; document.getElementById('adminPassword').value = ''; loadAdmins(); }
                else showToast('⚠️ ' + (data.error || '添加失败'));
            } catch(e) { showToast('⚠️ 网络错误'); }
        }
        async function deleteAdmin(id) {
            if (!confirm('确定要删除这个管理员吗？')) return;
            try {
                const res = await fetch(`/api/admins/${id}`, { method: 'DELETE', headers: { 'X-Admin-Session': adminSession } });
                const data = await res.json();
                if (data.success) { showToast('✅ 删除成功'); loadAdmins(); }
                else showToast('⚠️ ' + (data.error || '删除失败'));
            } catch(e) { showToast('⚠️ 网络错误'); }
        }
        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value, newPassword = document.getElementById('newPassword').value, confirmPassword = document.getElementById('confirmPassword').value;
            if (!currentPassword || !newPassword || !confirmPassword) { showToast('⚠️ 请填写所有密码字段'); return; }
            if (newPassword.length < 6) { showToast('⚠️ 新密码至少需要 6 位'); return; }
            if (newPassword !== confirmPassword) { showToast('⚠️ 两次输入的新密码不一致'); return; }
            try {
                const res = await fetch('/api/admin/change-password', { method: 'POST', headers: { 'Content-Type': 'application/json', 'X-Admin-Session': adminSession }, body: JSON.stringify({ current_password: currentPassword, new_password: newPassword }) });
                const data = await res.json();
                if (data.success) { showToast('✅ 密码修改成功'); document.getElementById('currentPassword').value = ''; document.getElementById('newPassword').value = ''; document.getElementById('confirmPassword').value = ''; }
                else showToast('⚠️ ' + (data.error || '修改失败'));
            } catch(e) { showToast('⚠️ 网络错误'); }
        }
        let isAuthChecked = false;
        async function init() {
            const authSuccess = await checkAuth();
            if (!authSuccess) return;
            isAuthChecked = true;
            document.getElementById('adminInfo').textContent = `${adminUsername} (${adminRole === 'master' ? '主管理员' : (adminRole === 'admin' ? '管理员' : '副管理员')})`;
            loadProducts();
        }
        init();
    </script>
</body>
</html>
