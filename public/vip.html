<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>开通会员</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding-bottom: 100px;
        }
        .header {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: 20px 16px;
            color: white;
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .back-btn {
            font-size: 24px;
            text-decoration: none;
            color: white;
        }
        .header-title h1 { font-size: 20px; font-weight: 700; }
        .header-title p { font-size: 13px; opacity: 0.9; margin-top: 4px; }
        .vip-card {
            margin: 20px 16px;
            background: linear-gradient(135deg, #FFD700, #FFA500);
            border-radius: 20px;
            padding: 30px 20px;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.2);
        }
        .vip-icon { font-size: 64px; margin-bottom: 16px; }
        .vip-title { font-size: 28px; font-weight: 700; color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.2); }
        .vip-price {
            margin-top: 20px;
            font-size: 48px;
            font-weight: 700;
            color: #fff;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }
        .vip-price span { font-size: 24px; }
        .vip-desc {
            margin-top: 10px;
            font-size: 14px;
            color: rgba(255,255,255,0.9);
        }
        .benefits {
            margin: 20px 16px;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .benefits-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 16px;
        }
        .benefit-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
        }
        .benefit-item:last-child { border-bottom: none; }
        .benefit-icon { font-size: 24px; }
        .benefit-text { font-size: 14px; color: #666; }
        .pay-section {
            margin: 20px 16px;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .pay-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
            margin-bottom: 16px;
        }
        .pay-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: transform 0.1s;
        }
        .pay-btn:active { transform: scale(0.98); }
        .pay-btn.wechat {
            background: linear-gradient(135deg, #07C160, #06AD56);
            box-shadow: 0 4px 12px rgba(7, 193, 96, 0.3);
        }
        .pay-btn.alipay {
            background: linear-gradient(135deg, #1677FF, #0958D9);
            box-shadow: 0 4px 12px rgba(22, 119, 255, 0.3);
        }
        .pay-icon { font-size: 24px; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 30px 24px;
            text-align: center;
            max-width: 320px;
            width: 90%;
        }
        .modal-title { font-size: 18px; font-weight: 700; margin-bottom: 16px; }
        .qr-placeholder {
            width: 200px;
            height: 200px;
            margin: 0 auto 20px;
            background: #f5f5f5;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            color: #999;
        }
        .modal-close {
            background: #f0f2f5;
            color: #666;
            padding: 12px 40px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            border: none;
        }
        .toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.82);
            color: white;
            padding: 12px 24px;
            border-radius: 20px;
            font-size: 14px;
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show { opacity: 1; }
        .user-status {
            margin: 20px 16px;
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
        }
        .status-badge {
            display: inline-block;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-top: 10px;
        }
        .status-badge.vip {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
        }
        .status-badge.normal {
            background: #f0f2f5;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="header-top">
            <a href="/" class="back-btn">←</a>
            <div class="header-title">
                <h1>开通会员</h1>
                <p>尊享特权 · 无限使用</p>
            </div>
        </div>
    </div>

    <div class="vip-card">
        <div class="vip-icon">👑</div>
        <div class="vip-title">年度会员</div>
        <div class="vip-price"><span>¥</span>1</div>
        <div class="vip-desc">1元开通 · 全年无限使用</div>
    </div>

    <div class="user-status" id="userStatus">
        <div style="font-size: 16px; font-weight: 600; color: #333;">当前状态</div>
        <div id="statusBadge" class="status-badge normal">普通用户</div>
        <div id="vipExpire" style="font-size: 13px; color: #999; margin-top: 8px;"></div>
    </div>

    <div class="benefits">
        <div class="benefits-title">🎁 会员特权</div>
        <div class="benefit-item">
            <div class="benefit-icon">♾️</div>
            <div class="benefit-text">无限次查看助力码和链接</div>
        </div>
        <div class="benefit-item">
            <div class="benefit-icon">🚀</div>
            <div class="benefit-text">优先获取最新活动信息</div>
        </div>
        <div class="benefit-item">
            <div class="benefit-icon">💎</div>
            <div class="benefit-text">专属会员标识</div>
        </div>
        <div class="benefit-item">
            <div class="benefit-icon">🎯</div>
            <div class="benefit-text">无广告体验</div>
        </div>
    </div>

    <div class="pay-section">
        <div class="pay-title">选择支付方式</div>
        <button class="pay-btn wechat" onclick="createOrder('wechat')">
            <span class="pay-icon">💚</span>
            微信支付
        </button>
        <button class="pay-btn alipay" onclick="createOrder('alipay')">
            <span class="pay-icon">💙</span>
            支付宝
        </button>
    </div>

    <div class="modal-overlay" id="qrModal" onclick="hideModal()">
        <div class="modal-box" onclick="event.stopPropagation()">
            <div class="modal-title">扫码支付 ¥1</div>
            <div class="qr-placeholder" id="qrCode">
                二维码加载中...
            </div>
            <div style="font-size: 13px; color: #999; margin-bottom: 16px;">
                打开微信或支付宝扫码支付
            </div>
            <button class="modal-close" onclick="hideModal()">取消</button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let sessionId = localStorage.getItem('sessionId');
        if (!sessionId) {
            sessionId = 'sess_' + Date.now() + '_' + Math.random().toString(36).substr(2, 8);
            localStorage.setItem('sessionId', sessionId);
        }

        async function checkUserStatus() {
            try {
                const res = await fetch('/api/user/info', {
                    headers: { 'X-Session-Id': sessionId }
                });
                const data = await res.json();
                
                const badge = document.getElementById('statusBadge');
                const expire = document.getElementById('vipExpire');
                
                if (data.is_vip) {
                    badge.className = 'status-badge vip';
                    badge.textContent = '👑 年度会员';
                    if (data.vip_expire_at) {
                        expire.textContent = '有效期至: ' + data.vip_expire_at.split('T')[0];
                    }
                } else {
                    badge.className = 'status-badge normal';
                    badge.textContent = '普通用户';
                    expire.textContent = '开通会员享更多特权';
                }
            } catch(e) {
                console.error('获取用户状态失败:', e);
            }
        }

        async function createOrder(payType) {
            try {
                showToast('正在创建订单...');
                const res = await fetch('/api/pay/create-order', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Session-Id': sessionId
                    },
                    body: JSON.stringify({
                        pay_type: payType,
                        description: '年度会员充值'
                    })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    showQRModal(data.pay_url);
                } else {
                    showToast('⚠️ ' + (data.error || '创建订单失败'));
                }
            } catch(e) {
                showToast('⚠️ 网络错误');
            }
        }

        function showQRModal(payUrl) {
            const modal = document.getElementById('qrModal');
            const qrCode = document.getElementById('qrCode');
            
            if (payUrl && payUrl !== 'weixin://wxpay/bizpay.htm?sr=xxxxx') {
                // 如果有真实的支付链接，显示二维码
                qrCode.innerHTML = '<div style="padding: 20px;">' + payUrl + '</div>';
            } else {
                qrCode.innerHTML = `
                    <div style="text-align: center;">
                        <div style="font-size: 48px; margin-bottom: 10px;">📱</div>
                        <div>演示模式</div>
                        <div style="font-size: 12px; margin-top: 8px; color: #999;">
                            实际使用时会显示支付二维码
                        </div>
                    </div>
                `;
            }
            
            modal.classList.add('show');
        }

        function hideModal() {
            document.getElementById('qrModal').classList.remove('show');
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // 初始化
        checkUserStatus();
    </script>
</body>
</html>
